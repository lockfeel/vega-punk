<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAGA-PUNK</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-dark: #080808;
            --bg-base: #101010;
            --bg-panel: #181818;
            --bg-surface: #202020;
            --bg-elevated: #282828;

            --primary-purple: #5c2e91;
            --primary-glow: rgba(92, 46, 145, 0.3);
            --secondary-green: #4ade80;
            --secondary-glow: rgba(74, 222, 128, 0.2);

            --text-main: #f0f0f0;
            --text-secondary: #a0a0aa;
            --text-muted: #6b6b7a;

            --border-subtle: rgba(92, 46, 145, 0.2);
            --border-highlight: rgba(75, 140, 74, 0.5);

            --nav-width: 72px;
            --list-width: 320px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(92, 46, 145, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(75, 140, 74, 0.05), transparent 25%);
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(92, 46, 145, 0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(75, 140, 74, 0.5);
        }

        .nav-bar {
            width: var(--nav-width);
            background: rgba(8, 8, 8, 0.8);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            z-index: 10;
        }

        .avatar-container {
            position: relative;
            margin-bottom: 32px;
            cursor: pointer;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: #ededed;
            padding: 2px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--bg-base);
        }

        .avatar-container:hover .avatar {
            transform: scale(1.1) rotate(5deg);
        }

        .nav-icons {
            display: flex;
            flex-direction: column;
            gap: 24px;
            flex: 1;
        }

        .nav-item {
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--secondary-green);
            background: rgba(75, 140, 74, 0.1);
            box-shadow: 0 0 15px var(--secondary-glow);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -12px;
            height: 24px;
            width: 4px;
            background: var(--secondary-green);
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 10px var(--secondary-green);
        }

        .nav-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .session-list {
            width: var(--list-width);
            background: var(--bg-panel);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
        }

        .search-container {
            padding: 24px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 12px 16px 12px 40px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--primary-purple);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* 全局图标尺寸 */
        i.fa-solid {
            font-size: 24px;
        }

        .search-icon {
            position: absolute;
            left: 36px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        .list-items {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
        }

        .list-item {
            display: flex;
            gap: 16px;
            padding: 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }

        .list-item:hover {
            background: var(--bg-elevated);
        }

        .list-item.active {
            background: linear-gradient(90deg, var(--bg-elevated), transparent);
            border: 1px solid var(--border-subtle);
            border-left: 3px solid var(--primary-purple);
        }

        .item-avatar {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: #ededed;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-purple);
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            border: 1px solid var(--border-subtle);
            flex-shrink: 0;
            position: relative;
        }

        .item-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 15px;
            object-fit: cover;
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }

        .item-name {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .item-preview {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-item.active .item-name {
            color: var(--secondary-green);
        }

        .bot-list {
            display: none;
        }

        .bot-list.visible {
            display: block;
        }

        .bot-group {
            margin-bottom: 4px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(92, 46, 145, 0.15);
        }

        .bot-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
            user-select: none;
            min-height: 48px;
        }

        .bot-group-header:hover {
            background: var(--bg-elevated);
        }

        .bot-group-title {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .bot-group-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            font-size: 0.75rem;
            color: var(--secondary-green);
            background: rgba(74, 222, 128, 0.12);
            border-radius: 50%;
            margin-right: 8px;
            border: 1px solid rgba(74, 222, 128, 0.25);
        }

        .bot-group-chevron {
            color: var(--text-muted);
            width: 16px;
            height: 16px;
            transition: transform 0.2s;
        }

        .bot-group-header.open .bot-group-chevron {
            transform: rotate(90deg);
        }

        .bot-group-items {
            display: none;
            padding: 0 4px;
        }

        .bot-group-items.open {
            display: block;
        }

        .session-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .session-panel.hidden {
            display: none;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-base);
            position: relative;
        }

        .chat-area::before {
            display: none;
        }

        .chat-header {
            height: 80px;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(9, 2, 10, 0.6);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #FFF, var(--secondary-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--secondary-green);
            background: rgba(75, 140, 74, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(75, 140, 74, 0.3);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--secondary-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--secondary-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-muted);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            color: var(--primary-purple);
            border-color: var(--primary-purple);
            background: rgba(92, 46, 145, 0.1);
        }

        .chat-history {
            flex: 1;
            padding: 32px 3.8%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
            z-index: 1;
        }

        .timestamp {
            text-align: center;
            margin: 16px 0;
            position: relative;
        }

        .timestamp span {
            background: var(--bg-panel);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            border: 1px solid var(--border-subtle);
        }

        .message-row {
            display: flex;
            gap: 20px;
            max-width: 100%;
        }

        .message-row.user {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            flex-shrink: 0;
            background: #ededed;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-subtle);
        }

        .message-row.bot .msg-avatar {
            color: var(--primary-purple);
        }

        .message-row.user .msg-avatar {
            background: var(--secondary-green);
            color: var(--bg-base);
            border: none;
            box-shadow: 0 0 15px var(--secondary-glow);
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 80%;
        }

        .message-row.user .msg-content {
            align-items: flex-end;
        }

        .msg-author {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: 'Syne', sans-serif;
            font-weight: 700;
        }

        .message-row.user .msg-author {
            display: none; 
        }

        .bubble {
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
        }

        .message-row.bot .bubble {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top-left-radius: 4px;
            backdrop-filter: blur(8px);
            color: #f3f4f6;
            position: relative;
            padding-right: 48px;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(92, 46, 145, 0.15);
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .message-row.bot .bubble:hover .copy-btn {
            background: rgba(92, 46, 145, 0.3);
        }

        .copy-btn:hover {
            background: rgba(92, 46, 145, 0.2);
            color: var(--primary-purple);
        }

        .copy-btn.copied {
            opacity: 1;
            color: var(--secondary-green);
        }

        .message-row.user .bubble {
            background: var(--primary-purple);
            color: #ffffff;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        .bubble p { margin-bottom: 12px; }
        .bubble p:last-child { margin-bottom: 0; }

        .bubble strong {
            color: var(--secondary-green);
            font-weight: 600;
        }

        .alert-box {
            background: rgba(255, 170, 0, 0.1);
            border-left: 3px solid #FFAA00;
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            margin: 16px 0;
            font-size: 0.9rem;
        }

        .alert-box.success {
            background: rgba(75, 140, 74, 0.1);
            border-left-color: var(--secondary-green);
        }

        .alert-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .alert-title.warning { color: #FFAA00; }
        .alert-title.success { color: var(--secondary-green); }

        .bubble h1, .bubble h2, .bubble h3, .bubble h4 {
            font-family: 'Syne', sans-serif;
            color: var(--secondary-green);
            margin: 16px 0 8px 0;
        }
        .bubble h1:first-child, .bubble h2:first-child, .bubble h3:first-child, .bubble h4:first-child {
            margin-top: 0;
        }
        .bubble ul, .bubble ol {
            padding-left: 24px;
            margin: 8px 0;
        }
        .bubble li { margin-bottom: 4px; }
        .bubble a {
            color: var(--primary-purple);
            text-decoration: underline;
        }
        .bubble blockquote {
            border-left: 3px solid var(--primary-purple);
            padding-left: 12px;
            margin: 8px 0;
            color: var(--text-secondary);
        }
        .bubble pre {
            background: #0B040F !important;
        }
        .bubble code {
            background: rgba(92, 46, 145, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #E2D6FF;
        }
        .bubble pre code {
            background: transparent;
            padding: 0;
        }
        .bubble p { margin-bottom: 12px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble strong, .bubble b {
            color: var(--secondary-green);
        }

        pre {
            background: #0B040F !important;
            border: 1px solid rgba(92, 46, 145, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            overflow-x: auto;
            position: relative;
        }

        pre::before {
            content: 'code';
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(92, 46, 145, 0.2);
            color: var(--text-muted);
            padding: 4px 10px;
            font-size: 0.7rem;
            border-radius: 0 0 0 8px;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #E2D6FF;
        }

        .syntax-keyword { color: var(--primary-purple); font-weight: 600; }
        .syntax-func { color: var(--secondary-green); }
        .syntax-string { color: #FFAA00; }
        .syntax-comment { color: #6A5A7A; font-style: italic; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-subtle);
        }

        th {
            font-family: 'Syne', sans-serif;
            color: var(--secondary-green);
            font-weight: 700;
            border-bottom: 2px solid var(--primary-purple);
        }

        .chat-input-wrapper {
            padding: 0 10% 32px 3.8%;
            background: linear-gradient(to top, var(--bg-base) 80%, transparent);
            z-index: 10;
        }

        .chat-input-container {
            background: rgba(8, 8, 8, 0.8);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(20px);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .chat-input-container:focus-within {
            border-color: var(--primary-purple);
            box-shadow: 0 0 25px rgba(92, 46, 145, 0.15);
        }

        .input-toolbar {
            display: flex;
            gap: 8px;
        }

        .toolbar-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .toolbar-btn:hover {
            background: rgba(92, 46, 145, 0.15);
            color: var(--primary-purple);
        }

        .input-area {
            display: flex;
            gap: 16px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            min-height: 24px;
            max-height: 150px;
            padding: 4px 0;
        }

        textarea:focus {
            outline: none;
        }

        textarea::placeholder {
            color: #6A5A7A;
        }

        .send-btn {
            background: var(--primary-purple);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .send-btn i.fa-solid {
            font-size: 18px;
        }

        .send-btn:hover {
            background: #753bb8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(92, 46, 145, 0.6);
        }

        /* 命令选择框 */
        .command-palette-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: none;
        }

        .command-palette-overlay.visible {
            display: block;
        }

        .command-palette {
            position: absolute;
            width: 520px;
            max-height: 60vh;
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px var(--primary-glow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: paletteSlideIn 0.2s ease-out;
        }

        @keyframes paletteSlideIn {
            from { opacity: 0; transform: translateY(10px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .command-palette-search {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .command-palette-search input {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
        }

        .command-palette-search input:focus {
            outline: none;
            border-color: var(--primary-purple);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .command-palette-search input::placeholder {
            color: var(--text-muted);
        }

        .command-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .command-group-title {
            font-family: 'Syne', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 12px 4px;
        }

        .command-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .command-item:hover, .command-item.highlighted {
            background: var(--bg-elevated);
        }

        .command-item.highlighted {
            background: rgba(92, 46, 145, 0.2);
            border: 1px solid var(--border-subtle);
        }

        .command-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(92, 46, 145, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-purple);
            font-size: 14px;
            flex-shrink: 0;
        }

        .command-item.highlighted .command-icon {
            background: rgba(74, 222, 128, 0.15);
            color: var(--secondary-green);
        }

        .command-info {
            flex: 1;
            min-width: 0;
        }

        .command-name {

<script>

    let ws = null;
    let lastReplyTime = null;
    let pendingMessage = null;
    let heartbeatTimer = null;
    let botsCache = {};
    const HEARTBEAT_INTERVAL = 30000;

    // 命令数据
    const openClawCommands = [
        // 状态查询
        { group: '状态查询', icon: 'fa-circle-question', name: '/help', desc: '显示可用命令列表' },
        { group: '状态查询', icon: 'fa-terminal', name: '/commands', desc: '列出所有斜杠命令' },

        // 会话管理

        { group: '会话管理', icon: 'fa-rotate-right', name: '/reset', desc: '重置当前会话' },
        { group: '会话管理', icon: 'fa-plus', name: '/new', desc: '开始新会话' },

        { group: '工具功能', icon: 'fa-comment-dots', name: '/btw', desc: '提问而不改变后续会话上下文' },

        { group: '工具功能', icon: 'fa-thought-bubble', name: '/think', desc: '设置思考级别' },
        { group: '工具功能', icon: 'fa-file-lines', name: '/verbose', desc: '切换详细模式' },
        { group: '工具功能', icon: 'fa-bolt', name: '/fast', desc: '切换快速模式' },
        { group: '工具功能', icon: 'fa-robot', name: '/model', desc: '显示或设置模型' },
        { group: '工具功能', icon: 'fa-queue', name: '/queue', desc: '调整队列设置' },
        // 子Agent/多会话
        { group: '子Agent', icon: 'fa-diagram-project', name: '/subagents', desc: '列出、终止、日志、生成、引导子agent' },
        { group: '子Agent', icon: 'fa-users', name: '/agents', desc: '列出当前会话的thread-bound agents' },
        { group: '子Agent', icon: 'fa-skull', name: '/kill', desc: '终止运行中的子agent' },
        { group: '子Agent', icon: 'fa-paper-plane', name: '/steer', desc: '向运行中的子agent发送指引' },
        { group: '子Agent', icon: 'fa-plug', name: '/acp', desc: '管理ACP会话和运行时选项' },
        { group: '子Agent', icon: 'fa-crosshairs', name: '/focus', desc: '绑定当前channel到session target' },
        { group: '子Agent', icon: 'fa-up-right-from-square', name: '/unfocus', desc: '移除channel绑定' },
        // 配置管理
        { group: '配置管理', icon: 'fa-gear', name: '/config', desc: '显示或设置配置值' },
        { group: '配置管理', icon: 'fa-server', name: '/mcp', desc: '显示或设置MCP服务器' },
        { group: '配置管理', icon: 'fa-bug', name: '/debug', desc: '设置运行时调试覆盖' },
        { group: '配置管理', icon: 'fa-check-double', name: '/allowlist', desc: '列出/添加/删除白名单条目' },
        { group: '配置管理', icon: 'fa-hand', name: '/approve', desc: '批准或拒绝exec请求' },
        { group: '配置管理', icon: 'fa-toggle-on', name: '/activation', desc: '设置群组激活模式' },
        { group: '配置管理', icon: 'fa-paper-plane', name: '/send', desc: '设置发送策略' },
        { group: '配置管理', icon: 'fa-shield-halved', name: '/elevated', desc: '切换提升模式' },
        { group: '配置管理', icon: 'fa-terminal', name: '/exec', desc: '设置本会话的exec默认配置' },
        { group: '配置管理', icon: 'fa-code', name: '/bash', desc: '运行主机shell命令（仅主机）' },
        // 插件相关
        { group: '插件', icon: 'fa-bell', name: '/webhook', desc: '管理webhook' },
    ];

    let highlightedIndex = -1;
    let filteredCommands = [];

    function showCommandPalette() {
        const overlay = document.getElementById('commandPaletteOverlay');
        const palette = overlay.querySelector('.command-palette');
        const searchInput = document.getElementById('commandSearchInput');
        const commandsBtn = document.querySelector('[title="code-list"]');

        // 计算按钮位置
        const btnRect = commandsBtn.getBoundingClientRect();
        const paletteWidth = 520;
        const padding = 12;

        // 面板右对齐于按钮右侧
        let left = btnRect.right - paletteWidth;
        // 确保不超出左边界
        if (left < padding) left = padding;

        // 面板底部对齐到按钮顶部，向上悬浮
        palette.style.left = left + 'px';
        palette.style.top = 'auto';
        palette.style.bottom = (window.innerHeight - btnRect.top + padding) + 'px';

        overlay.classList.add('visible');
        searchInput.value = '';
        highlightedIndex = -1;
        filteredCommands = [...openClawCommands];
        renderCommandList(filteredCommands);
        setTimeout(() => searchInput.focus(), 50);
    }

    function hideCommandPalette() {
        const overlay = document.getElementById('commandPaletteOverlay');
        overlay.classList.remove('visible');
    }

    function renderCommandList(commands) {
        const commandList = document.getElementById('commandList');
        if (commands.length === 0) {
            commandList.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:0.9rem;">没有找到匹配的命令</div>';
            return;
        }

        let html = '';
        let currentGroup = '';
        commands.forEach((cmd, idx) => {
            if (cmd.group !== currentGroup) {
                currentGroup = cmd.group;
                html += `<div class="command-group-title">${currentGroup}</div>`;
            }
            html += `
                <div class="command-item ${idx === highlightedIndex ? 'highlighted' : ''}" data-index="${idx}">
                    <div class="command-icon"><i class="fa-solid ${cmd.icon}"></i></div>
                    <div class="command-info">
                        <div class="command-name">${cmd.name}</div>
                        <div class="command-desc">${cmd.desc}</div>
                    </div>
                </div>
            `;
        });
        commandList.innerHTML = html;

        commandList.querySelectorAll('.command-item').forEach(item => {
            item.addEventListener('click', () => {
                const idx = parseInt(item.dataset.index);
                selectCommand(filteredCommands[idx]);
            });
        });
    }

    function selectCommand(cmd) {
        hideCommandPalette();
        console.log('[UI] 选择命令:', cmd.name);
        sendWebSocketMessage(cmd.name);
    }

    function filterCommands(query) {
        const q = query.toLowerCase().trim();
        if (!q) return [...openClawCommands];
        return openClawCommands.filter(cmd =>
            cmd.name.toLowerCase().includes(q) ||
            cmd.desc.toLowerCase().includes(q) ||
            cmd.group.toLowerCase().includes(q)
        );
    }

    function highlightText(text, query) {
        if (!query || !text) return text;
        const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, '<mark style="background:rgba(74,222,128,0.25);color:var(--secondary-green);border-radius:2px;padding:0 2px;">$1</mark>');
    }

    function applyCurrentSearch() {
        const searchBar = document.querySelector('.search-bar');
        const query = searchBar ? searchBar.value.trim() : '';
        if (activeChatsCache.length > 0) {
            _renderSessionPanel(activeChatsCache, query);
        }
        _renderBotList(query);
    }

    function checkAndInsertTimestamp() {
        const now = Date.now();
        if (lastReplyTime === null || now - lastReplyTime > 5 * 60 * 1000) {
            const chatHistory = document.getElementById('chatHistory');
            const ts = document.createElement('div');
            ts.className = 'timestamp';
            const d = new Date(now);
            const timeStr = `${d.getMonth() + 1}-${d.getDate().toString().padStart(2, '0')} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
            ts.innerHTML = `<span>${timeStr}</span>`;
            chatHistory.appendChild(ts);
        }
        lastReplyTime = now;
    }

    function sendWebSocketMessage(text) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            console.warn('[WS] 连接未就绪，消息已挂起:', text);
            pendingMessage = text;
            connectWebSocket();
            return;
        }
        const userData = JSON.parse(localStorage.getItem('userInfo') || '{}');
        console.log('[WS] 发送消息, userId:', userData.userId, ', botId:', currentBot.botId);
        ws.send(JSON.stringify({ user: userData.userId || '', text, botId: currentBot.botId }));
    }

    function applyUserInfo(userData) {
        if (userData.userHeadurl) {
            document.querySelectorAll('.user-head img').forEach(img => {
                img.src = userData.userHeadurl;
            });
        }
    }

    function formatLastTime(timestamp) {
        if (!timestamp) return '';
        const now = new Date();
        const d = new Date(timestamp * 1000);
        const diffMs = now - d;
        const diffMin = Math.floor(diffMs / 60000);
        if (diffMin < 1) return '刚刚';
        if (diffMin < 60) return `${diffMin}分钟前`;
        const diffHr = Math.floor(diffMin / 60);
        if (diffHr < 24) return `${diffHr}小时前`;
        if (diffHr < 48) return `昨天 ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        return `${d.getMonth() + 1}/${d.getDate()} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
    }

    let activeChatsCache = [];

    function renderSessionPanel(activeChats) {
        activeChatsCache = activeChats;
        _renderSessionPanel(activeChats);
    }

    function _renderSessionPanel(activeChats, query) {
        const sessionPanel = document.getElementById('sessionPanel');
        activeBotsSet = new Set(activeChats.map(chat => chat.botId));

        let filtered = activeChats;
        if (query) {
            const q = query.toLowerCase();
            filtered = activeChats.filter(chat =>
                chat.name.toLowerCase().includes(q) ||
                (chat.lastContent && chat.lastContent.toLowerCase().includes(q))
            );
        }

        sessionPanel.innerHTML = filtered.map((chat, idx) => `
            <div class="list-item ${chat.botId === currentBot.botId ? 'active' : ''}" data-bot-id="${chat.botId}">
                <div class="item-avatar">
                    <img src="${chat.avatar}" alt="${chat.name}" style="width:100%; border-radius:12px;">
                </div>
                <div class="item-content">
                    <div class="item-header">
                        <span class="item-name">${query ? highlightText(chat.name, query) : chat.name}</span>
                        <span class="item-time">${formatLastTime(chat.lastTime)}</span>
                    </div>
                    <div class="item-preview">${query ? highlightText(chat.lastContent || '暂无消息', query) : (chat.lastContent || '暂无消息')}</div>
                </div>
            </div>
        `).join('');

        if (filtered.length === 0 && query) {
            sessionPanel.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:0.85rem;">没有匹配的会话</div>';
        }

        sessionPanel.querySelectorAll('.list-item').forEach(item => {
            item.addEventListener('click', () => {
                const botId = item.dataset.botId;
                const bot = botsCache[botId];
                if (bot) switchBot(bot);
            });
        });
    }

    async function loadActiveChats() {
        try {
            const response = await fetch('/active', { method: 'POST' });
            const result = await response.json();
            console.log('[API] /active 响应:', result);
            if (result.active && result.active.length > 0) {
                renderSessionPanel(result.active);
            }
        } catch (error) {
            console.error('[API] /active 请求失败:', error);
        }
    }

    async function loadBots() {
        try {
            const response = await fetch('/bots',{method: 'POST'});
            const result = await response.json();
            console.log('[API] /bots 响应:', result);
            if (result.bots) {
                result.bots.forEach(bot => {
                    botsCache[bot.botId] = bot;
                });
                console.log('[API] botsCache 已加载:', Object.keys(botsCache).length, '个 bot');
                renderBotList();
                loadActiveChats();
            }
        } catch (error) {
            console.error('[API] /bots 请求失败:', error);
        }
    }

    function renderBotList() {
        _renderBotList();
    }

    function _renderBotList(query) {
        const botList = document.getElementById('botList');
        const bots = Object.values(botsCache);
        if (!bots.length) return;

        // 按 status（分组名称）聚合
        const groups = {};
        bots.forEach(bot => {
            const desc = bot.status || '其他';
            if (!groups[desc]) groups[desc] = [];
            groups[desc].push(bot);
        });

        let html = '';
        let hasResults = false;

        Object.entries(groups).forEach(([desc, members]) => {
            let filteredMembers = members;
            if (query) {
                const q = query.toLowerCase();
                filteredMembers = members.filter(bot =>
                    bot.name.toLowerCase().includes(q) ||
                    bot.botId.toLowerCase().includes(q) ||
                    (bot.status && bot.status.toLowerCase().includes(q))
                );
            }
            if (filteredMembers.length === 0) return;
            hasResults = true;

            html += `
                <div class="bot-group">
                    <div class="bot-group-header" data-group="${desc}">
                        <span class="bot-group-title">${query ? highlightText(desc, query) : desc}</span>
                        <div style="display:flex;align-items:center;">
                            <span class="bot-group-count">${filteredMembers.length}</span>
                            <svg class="bot-group-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                        </div>
                    </div>
                    <div class="bot-group-items" data-group="${desc}">
                        ${filteredMembers.map(bot => `
                            <div class="list-item" data-bot-id="${bot.botId}">
                                <div class="item-avatar">
                                    <img src="${bot.avatar}" alt="${bot.name}" style="width:100%; border-radius:12px;">
                                </div>
                                <div class="item-content">
                                    <div class="item-header">
                                        <span class="item-name">${query ? highlightText(bot.name, query) : bot.name}</span>
                                    </div>
                                    <div class="item-preview">${bot.botId}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });

        if (!hasResults && query) {
            botList.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:0.85rem;">没有匹配的机器人</div>';
        } else {
            botList.innerHTML = html;
        }

        // 有搜索时自动展开所有组
        if (query) {
            botList.querySelectorAll('.bot-group-header').forEach(header => header.classList.add('open'));
            botList.querySelectorAll('.bot-group-items').forEach(items => items.classList.add('open'));
        }

        // 分组折叠/展开
        botList.querySelectorAll('.bot-group-header').forEach(header => {
            header.addEventListener('click', () => {
                const desc = header.dataset.group;
                const items = botList.querySelector(`.bot-group-items[data-group="${desc}"]`);
                header.classList.toggle('open');
                items.classList.toggle('open');
            });
        });

        // bot 点击切换
        botList.querySelectorAll('.list-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                const botId = item.dataset.botId;
                const bot = botsCache[botId];
                if (bot) switchBot(bot);
            });
        });
    }

    let currentBot = {
        botId: 'vega-punk',
        name: '慎思者',
        avatar: 'https://res.amemo.cn/vega-punk.png'
    };

    let activeBotsSet = new Set();

    async function switchBot(bot) {
        currentBot = bot;
        document.getElementById('headerBotName').textContent = bot.name;
        showPanel('sessions');

        const isInSession = activeBotsSet.has(bot.botId);
        await loadActiveChats();

        if (!isInSession) {
            console.log('[UI] BOT 不在会话列表中，发送 /init-bot');
            sendWebSocketMessage('/init-bot');
            setTimeout(async () => {
                console.log('[UI] 1秒后刷新会话列表');
                await loadActiveChats();
            }, 500);
        }

        await loadMessages();
    }

    function showPanel(type) {
        const sessionPanel = document.getElementById('sessionPanel');
        const botList = document.getElementById('botList');
        const navSessions = document.getElementById('navSessions');
        const navBots = document.getElementById('navBots');
        if (type === 'sessions') {
            sessionPanel.classList.remove('hidden');
            botList.classList.remove('visible');
            navSessions.classList.add('active');
            navBots.classList.remove('active');
        } else {
            sessionPanel.classList.add('hidden');
            botList.classList.add('visible');
            navBots.classList.add('active');
            navSessions.classList.remove('active');
        }
    }

    async function loadUserInfo() {
        try {
            const userToken = localStorage.getItem('userToken') || '';
            const response = await fetch('https://skill.amemo.cn/user-info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: userToken })
            });
            const result = await response.json();
            if (result.code === 200 && result.data) {
                const userData = result.data;
                localStorage.setItem('userInfo', JSON.stringify(userData));
                applyUserInfo(userData);
                connectWebSocket();
            }
        } catch (error) {
            console.error('[API] /user-info 请求失败:', error);
        }
    }

    function startHeartbeat() {
        stopHeartbeat();
        heartbeatTimer = setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                try {
                    ws.send(JSON.stringify({ type: 'ping' }));
                } catch (e) {
                    console.error('[WS] 发送心跳失败:', e);
                }
            }
        }, HEARTBEAT_INTERVAL);
    }

    function stopHeartbeat() {
        if (heartbeatTimer) {
            clearInterval(heartbeatTimer);
            heartbeatTimer = null;
        }
    }

    function connectWebSocket() {
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
            return;
        }
        ws = new WebSocket(`ws://127.0.0.1:8893/chatClaw`);
        stopHeartbeat();
        ws.onopen = () => {
            console.log('[WS] 连接已建立');
            startHeartbeat();
            if (pendingMessage) {
                console.log('[WS] 发送挂起消息:', pendingMessage);
                sendWebSocketMessage(pendingMessage);
                pendingMessage = null;
                return;
            }
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                console.log('[WS] 收到消息:', data.type, data);
                const msgBotId = data.botId;
                if (msgBotId && msgBotId !== currentBot.botId) {
                    const bot = botsCache[msgBotId];
                    if (bot) {
                        switchBot(bot);
                    }
                    return;
                }
                if (data.type === 'delta') {
                    let msgRow = document.querySelector(`[data-runid="${data.runId}"]`);
                    if (!msgRow) {
                        checkAndInsertTimestamp();
                        const bot = botsCache[msgBotId] || currentBot;
                        msgRow = document.createElement('div');
                        msgRow.className = 'message-row bot';
                        msgRow.setAttribute('data-runid', data.runId);
                        msgRow.innerHTML = `
                            <div class="msg-avatar">
                                <img src="${bot.avatar}" style="width:100%;height:100%;border-radius:12px;object-fit:cover;">
                            </div>
                            <div class="msg-content">
                                <span class="msg-author">${bot.name}</span>
                                <div class="bubble"><button class="copy-btn" onclick="copyContent(this)"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button><div class="msg-text"></div></div>
                            </div>
                        `;
                        document.getElementById('chatHistory').appendChild(msgRow);
                    }
                    msgRow.querySelector('.msg-text').innerHTML = safeMarkdown(data.text);
                    scrollToBottom();
                } else if (data.type === 'final') {
                    let msgRow = document.querySelector(`[data-runid="${data.runId}"]`);
                    if (msgRow) {
                        msgRow.querySelector('.msg-text').innerHTML = safeMarkdown(data.content);
                        scrollToBottom();
                    }
                }
            } catch (e) {
                console.error('[WS] 解析消息失败:', e, event.data);
            }
        };

        ws.onerror = (error) => {
            console.error('[WS] 连接错误:', error);
            setTimeout(connectWebSocket, 3000);
        };
        ws.onclose = (event) => {
            console.warn(`[WS] 连接已关闭 (code=${event.code}, reason=${event.reason || '无'})`);
            stopHeartbeat();
            setTimeout(connectWebSocket, 3000);
        };
    }

    async function loadMessages() {
        try {
            const response = await fetch('/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ botId: currentBot.botId, limit: 200 })
            });
            const result = await response.json();
            console.log('[API] /messages 响应:', result);
            if (result.messages) {
                const chatHistory = document.getElementById('chatHistory');
                chatHistory.innerHTML = '<div style="height: 20px;"></div>';
                const msgs = result.messages.reverse();
                let lastTs = null;
                msgs.forEach(msg => {
                    const msgTime = msg.createTime * 1000;
                    if (!lastTs || msgTime - lastTs > 5 * 60 * 1000) {
                        const d = new Date(msgTime);
                        const timeStr = `${d.getMonth() + 1}-${d.getDate().toString().padStart(2, '0')} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                        const ts = document.createElement('div');
                        ts.className = 'timestamp';
                        ts.innerHTML = `<span>${timeStr}</span>`;
                        chatHistory.appendChild(ts);
                    }
                    lastTs = msgTime;
                    if (msg.role === 'user') {
                        appendUserMessageSilent(msg.content);
                    } else if (msg.role === 'assistant') {
                        appendBotMessageSilent(msg.content, currentBot.name, currentBot.avatar);
                    }
                });
                lastReplyTime = lastTs;
                scrollToBottom();
            }
        } catch (error) {
            console.error('[API] /messages 请求失败:', error);
        }
    }

    function appendUserMessageSilent(text) {
        const msgRow = document.createElement('div');
        msgRow.className = 'message-row user';
        const userHeadUrl = (JSON.parse(localStorage.getItem('userInfo') || '{}')).userHeadurl || '';
        msgRow.innerHTML = `
            <div class="msg-avatar user-head">
                ${userHeadUrl ? `<img src="${userHeadUrl}" style="width:100%;height:100%;border-radius:12px;object-fit:cover;">` : ''}
            </div>
            <div class="msg-content">
                <span class="msg-author">You</span>
                <div class="bubble">${text.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>')}</div>
            </div>
        `;
        document.getElementById('chatHistory').appendChild(msgRow);
    }

    function safeMarkdown(text) {
        if (typeof marked !== 'undefined') {
            return marked.parse(text);
        }
        return text.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
    }

    function appendBotMessageSilent(text, authorName, authorAvatar) {
        const msgRow = document.createElement('div');
        msgRow.className = 'message-row bot';
        msgRow.innerHTML = `
            <div class="msg-avatar">
                <img src="${authorAvatar || 'https://res.amemo.cn/vega-punk.png'}" style="width:100%;height:100%;border-radius:12px;object-fit:cover;">
            </div>
            <div class="msg-content">
                <span class="msg-author">${authorName || 'VegaPunk'}</span>
                <div class="bubble"><button class="copy-btn" onclick="copyContent(this)"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button><div class="msg-text"></div></div>
            </div>
        `;
        msgRow.querySelector('.msg-text').innerHTML = safeMarkdown(text);
        document.getElementById('chatHistory').appendChild(msgRow);
    }

    function scrollToBottom() {
        const chatHistory = document.getElementById('chatHistory');
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function copyContent(btn) {
        const msgText = btn.closest('.bubble').querySelector('.msg-text');
        const text = msgText.innerText;
        navigator.clipboard.writeText(text).then(() => {
            btn.classList.add('copied');
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
            }, 1500);
        });
    }

    function OnInput() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        if (this.value === '') {
            this.style.height = 'auto';
        }
    }

    function appendUserMessage(text) {
        const msgRow = document.createElement('div');
        msgRow.className = 'message-row user';
        const userHeadUrl = (JSON.parse(localStorage.getItem('userInfo') || '{}')).userHeadurl || '';
        msgRow.innerHTML = `
            <div class="msg-avatar user-head">
                ${userHeadUrl ? `<img src="${userHeadUrl}" style="width:100%;height:100%;border-radius:12px;object-fit:cover;">` : ''}
            </div>
            <div class="msg-content">
                <span class="msg-author">You</span>
                <div class="bubble">${text.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>')}</div>
            </div>
        `;
        const chatHistory = document.getElementById('chatHistory');
        chatHistory.appendChild(msgRow);
        scrollToBottom();
    }

    document.addEventListener('DOMContentLoaded', () => {

        const tx = document.getElementById('messageInput');
        tx.addEventListener('input', OnInput, false);

        const chatHistory = document.getElementById('chatHistory');
        chatHistory.scrollTop = chatHistory.scrollHeight;

        function sendMessage() {
            const text = tx.value.trim();
            if (!text) return;
            console.log('[UI] 用户发送消息:', text);

            tx.value = '';
            tx.style.height = 'auto';

            appendUserMessage(text);
            sendWebSocketMessage(text);
        }

        const sendBtn = document.getElementById('sendBtn');
        sendBtn.addEventListener('click', sendMessage);

        tx.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        loadBots();
        loadUserInfo();
        loadMessages();
        document.getElementById('navSessions').addEventListener('click', () => showPanel('sessions'));
        document.getElementById('navBots').addEventListener('click', () => showPanel('bots'));

        // 搜索栏 - 本地搜索机器人和会话
        const searchBar = document.querySelector('.search-bar');
        let searchDebounceTimer = null;
        searchBar.addEventListener('input', () => {
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => {
                applyCurrentSearch();
            }, 150);
        });

        // 删除当前会话
        const deleteBtn = document.querySelector('.action-btn');
        if (deleteBtn) {
            deleteBtn.addEventListener('click', () => {
                showDeleteConfirm();
            });
        }

        function showDeleteConfirm() {
            const overlay = document.getElementById('deleteConfirmOverlay');
            const botInfo = document.getElementById('deleteConfirmBotInfo');
            botInfo.querySelector('img').src = currentBot.avatar;
            botInfo.querySelector('.delete-confirm-bot-name').textContent = currentBot.name;
            overlay.classList.add('visible');
        }

        function hideDeleteConfirm() {
            document.getElementById('deleteConfirmOverlay').classList.remove('visible');
        }

        document.getElementById('deleteCancelBtn').addEventListener('click', hideDeleteConfirm);

        document.getElementById('deleteConfirmBtn').addEventListener('click', async () => {
            hideDeleteConfirm();
            await deleteCurrentChat();
        });

        document.getElementById('deleteConfirmOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                hideDeleteConfirm();
            }
        });

        async function deleteCurrentChat() {
            try {
                const response = await fetch('/delete-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ botId: currentBot.botId })
                });
                const result = await response.json();
                console.log('[API] /delete-chat 响应:', result);
                // 清空聊天历史
                const chatHistory = document.getElementById('chatHistory');
                chatHistory.innerHTML = '<div style="height: 20px;"></div>';
                lastReplyTime = null;
                // 刷新会话列表
                await loadActiveChats();
            } catch (error) {
                console.error('[API] /delete-chat 请求失败:', error);
            }
        }

        // 命令选择框
        const commandsBtn = document.querySelector('[title="code-list"]');
        if (commandsBtn) {
            commandsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showCommandPalette();
            });
        }

        const commandSearchInput = document.getElementById('commandSearchInput');
        commandSearchInput.addEventListener('input', (e) => {
            filteredCommands = filterCommands(e.target.value);
            highlightedIndex = -1;
            renderCommandList(filteredCommands);
        });

        commandSearchInput.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                highlightedIndex = Math.min(highlightedIndex + 1, filteredCommands.length - 1);
                renderCommandList(filteredCommands);
                scrollHighlightedIntoView();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                highlightedIndex = Math.max(highlightedIndex - 1, 0);
                renderCommandList(filteredCommands);
                scrollHighlightedIntoView();
            } else if (e.key === 'Enter' && highlightedIndex >= 0) {
                e.preventDefault();
                selectCommand(filteredCommands[highlightedIndex]);
            }
        });

        document.getElementById('commandPaletteOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                hideCommandPalette();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideCommandPalette();
            }
        });

        function scrollHighlightedIntoView() {
            const highlighted = document.querySelector('.command-item.highlighted');
            if (highlighted) {
                highlighted.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }
    });
</script>
</body>
</html>
